<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram - Explore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body class="ig-body">
  <nav class="ig-sidebar d-none d-lg-flex flex-column">
    <div class="ig-sidebar-inner">
      <a href="index.html" class="ig-logo-wrap mb-2"><span class="fw-bold fs-4">Instagram</span></a>
      <ul class="ig-nav list-unstyled mt-1">
        <li><a href="index.html" class="ig-nav-link"><i class="bi bi-house"></i><span class="ig-nav-label">Home</span></a></li>
        <li><a href="explore.html" class="ig-nav-link active"><i class="bi bi-search"></i><span class="ig-nav-label">Explore</span></a></li>
        <li><a href="messages.html" class="ig-nav-link"><i class="bi bi-chat-dots"></i><span class="ig-nav-label">Messages</span></a></li>
        <li><a href="reels.html" class="ig-nav-link"><i class="bi bi-camera-reels"></i><span class="ig-nav-label">Reels</span></a></li>
        <li><a href="notifications.html" class="ig-nav-link"><i class="bi bi-heart"></i><span class="ig-nav-label">Likes</span></a></li>
        <li><a href="profile.html" class="ig-nav-link"><img src="profile-picture.jpeg" class="ig-nav-avatar" alt="" /><span class="ig-nav-label">Profile</span></a></li>
      </ul>
    </div>
  </nav>

  <main class="ig-main ig-explore-main">
    <div class="ig-notif-wrap">
      <h2 class="ig-notif-title">Explore</h2>
      <div class="ig-explore-search-wrap mb-4">
        <i class="bi bi-search ig-explore-search-icon"></i>
        <input type="text" id="exploreSearch" class="ig-explore-search-input" placeholder="Search photos like travel, food, art..." />
      </div>

      <div class="ig-grid">
        <div class="ig-grid-item" data-search="travel beach goa"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=500&q=80" alt="Beach" /><div class="ig-grid-overlay"><i class="bi bi-heart-fill"></i> 240</div></div>
        <div class="ig-grid-item" data-search="Stone Tower"><img src="tree.jpeg" alt="Art" /><div class="ig-grid-overlay"><i class="bi bi-heart-fill"></i> 180</div></div>
        <div class="ig-grid-item" data-search="city sunset photography"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=500&q=80" alt="City" /><div class="ig-grid-overlay"><i class="bi bi-heart-fill"></i> 320</div></div>
        <div class="ig-grid-item" data-search="food cafe coffee"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=500&q=80" alt="Coffee" /><div class="ig-grid-overlay"><i class="bi bi-heart-fill"></i> 96</div></div>
        <div class="ig-grid-item" data-search="Sand sun at the beach"><img src="sun.jpeg" alt="Students" /><div class="ig-grid-overlay"><i class="bi bi-heart-fill"></i> 150</div></div>
        <div class="ig-grid-item" data-search="nature mountain travel"><img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=500&q=80" alt="Nature" /><div class="ig-grid-overlay"><i class="bi bi-heart-fill"></i> 210</div></div>
      </div>
    </div>
  </main>

  <nav class="ig-mobile-nav d-flex d-lg-none">
    <a href="index.html" class="ig-mob-link"><i class="bi bi-house-fill"></i></a>
    <a href="explore.html" class="ig-mob-link active"><i class="bi bi-search"></i></a>
    <a href="messages.html" class="ig-mob-link"><i class="bi bi-chat-dots"></i></a>
    <a href="reels.html" class="ig-mob-link"><i class="bi bi-camera-reels"></i></a>
    <a href="profile.html" class="ig-mob-link"><img src="C:\Users\anike\OneDrive\Pictures\Camera Roll\WhatsApp Image 2026-06-14 at 4.27.42 PM.jpeg" class="ig-mob-avatar" alt="" /></a>
  </nav>

  <div class="position-fixed bottom-0 start-50 translate-middle-x mb-4" style="z-index:9999;">
    <div id="igToast" class="ig-toast" style="display:none;"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
