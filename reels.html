<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram - Reels</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body class="ig-body">
  <nav class="ig-sidebar d-none d-lg-flex flex-column">
    <div class="ig-sidebar-inner">
      <a href="index.html" class="ig-logo-wrap mb-2"><span class="fw-bold fs-4">Instagram</span></a>
      <ul class="ig-nav list-unstyled mt-1">
        <li><a href="index.html" class="ig-nav-link"><i class="bi bi-house"></i><span class="ig-nav-label">Home</span></a></li>
        <li><a href="explore.html" class="ig-nav-link"><i class="bi bi-search"></i><span class="ig-nav-label">Explore</span></a></li>
        <li><a href="messages.html" class="ig-nav-link"><i class="bi bi-chat-dots"></i><span class="ig-nav-label">Messages</span></a></li>
        <li><a href="reels.html" class="ig-nav-link active"><i class="bi bi-camera-reels-fill"></i><span class="ig-nav-label">Reels</span></a></li>
        <li><a href="notifications.html" class="ig-nav-link"><i class="bi bi-heart"></i><span class="ig-nav-label">Likes</span></a></li>
        <li><a href="profile.html" class="ig-nav-link"><img src="profile-picture.jpeg" class="ig-nav-avatar" alt="" /><span class="ig-nav-label">Profile</span></a></li>
      </ul>
    </div>
  </nav>

  <main class="ig-main">
    <div class="ig-feed-layout">
      <section class="ig-feed-col">
        <div class="ig-reels-intro mb-4">
          <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
            <div>
              <h2 class="fw-bold mb-1">Reels</h2>
              <p class="text-muted mb-0">A simple space for original clips and creative moments.</p>
            </div>
            <button class="btn btn-dark btn-sm">+ New reel</button>
          </div>
        </div>

        <div class="ig-reels-stack-head">
          <p class="ig-reels-note">Double-tap to like • Tap to play/pause • Scroll for more reels</p>
        </div>

        <div id="reelsFeed" class="ig-reels-feed"></div>
        <div class="ig-reels-end-note">Loading more reels…</div>
      </section>

      <aside class="ig-suggestions-col d-none d-xl-block">
        <div class="ig-sidebar-user mb-4">
          <img src="profile-picture.jpeg" class="ig-sidebar-user-avatar" alt="" />
          <div class="ig-sidebar-user-info">
            <a href="profile.html" class="ig-sidebar-username">aniket</a>
            <div class="ig-sidebar-name">Reels creator</div>
          </div>
        </div>

        <div class="ig-suggestion-item">
          <img src="chinu.jpg" class="ig-sug-avatar" alt="" />
          <div class="ig-sug-info"><a href="profile.html" class="ig-sug-username">chinu_photo</a></div>
          <button class="ig-follow-btn" onclick="igFollow(this)">Follow</button>
        </div>
        <div class="ig-suggestion-item">
          <img src="https://i.pravatar.cc/32?img=9" class="ig-sug-avatar" alt="" />
          <div class="ig-sug-info"><a href="profile.html" class="ig-sug-username">priya_art</a></div>
          <button class="ig-follow-btn" onclick="igFollow(this)">Follow</button>
        </div>
      </aside>
    </div>
  </main>

  <nav class="ig-mobile-nav d-flex d-lg-none">
    <a href="index.html" class="ig-mob-link"><i class="bi bi-house-fill"></i></a>
    <a href="explore.html" class="ig-mob-link"><i class="bi bi-search"></i></a>
    <a href="messages.html" class="ig-mob-link"><i class="bi bi-chat-dots"></i></a>
    <a href="reels.html" class="ig-mob-link active"><i class="bi bi-camera-reels"></i></a>
    <a href="profile.html" class="ig-mob-link"><img src="C:\Users\anike\OneDrive\Pictures\Camera Roll\WhatsApp Image 2026-06-14 at 4.27.42 PM.jpeg" class="ig-mob-avatar" alt="" /></a>
  </nav>

  <div class="position-fixed bottom-0 start-50 translate-middle-x mb-4" style="z-index:9999;">
    <div id="igToast" class="ig-toast" style="display:none;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
